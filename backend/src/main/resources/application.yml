spring:
  application:
    name: railyatra-backend

spring: 
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_SECRET}

booking:
  convenience-fee: 15.00
  max-passengers-per-booking: 6

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.railyatra: INFO
    org.springframework.security: WARN
