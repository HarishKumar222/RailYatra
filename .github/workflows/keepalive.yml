name: Keep Render Alive
on:
  schedule:
    - cron: '*/15 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RailYatra Backend
        run: |
          curl -f https://railyatra-bakend.onrender.com/actuator/health
          echo "Backend is alive!"
